/* ═══════ UTILS ═══════ */
function sRand(seed){let s=Math.abs(Math.floor(seed))%2147483647||1;return()=>{s=s*16807%2147483647;return(s-1)/2147483646;};}
function d2s(d){return d.replace(/-/g,"").split("").reduce((a,c,i)=>a+c.charCodeAt(0)*(i+7),0);}
function shufl(arr,r){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getWeekId(){return Math.floor(Date.now()/(7*24*3600*1000));}
function getWeekStart(){const d=new Date(TODAY);d.setDate(d.getDate()-d.getDay());return d.toISOString().slice(0,10);}
function getBoss(weekId){const b=BOSSES[weekId%BOSSES.length];return{...b,maxHp:b.hp};}
function getDailyQuote(dateStr){const r=sRand(d2s(dateStr)+999);return QUOTES[Math.floor(r()*QUOTES.length)];}
function getWeeklyChallenge(weekId){const r=sRand(weekId*777);return WEEKLY_CHALLENGES[Math.floor(r()*WEEKLY_CHALLENGES.length)];}
function getLoginBonus(streak){
  if(streak<=0)return{xp:25,i:"⚡",msg:"Welcome, warrior"};
  if(streak===1)return{xp:50,i:"🔥",msg:"Day 1 streak!"};
  if(streak<7) return{xp:50+streak*10,i:"🌑",msg:`${streak} day streak bonus`};
  if(streak<14)return{xp:150,i:"💀",msg:"One week strong!"};
  if(streak<30)return{xp:250,relic:true,i:"💎",msg:"Two weeks of darkness!"};
  return{xp:500,relic:true,i:"👑",msg:"LEGENDARY dedication!"};
}
function genQuests(dateStr,arc,customQ){
  const k=arc||"warrior";
  const r=sRand(d2s(dateStr)+(k.charCodeAt(0)*31));
  let pool=k==="mage"
    ?[...QPOOL.warrior.slice(0,3),...QPOOL.scholar.slice(0,3),...QPOOL.artisan.slice(0,3),...QPOOL.rogue.slice(0,3)]
    :(QPOOL[k]||QPOOL.warrior);
  const base=shufl(pool,r).slice(0,4+Math.floor(r()*2)).map((q,i)=>{
    const tv=q.tv[Math.floor(r()*q.tv.length)];
    return{id:i,title:q.t,desc:q.d.replace("{n}",tv),xp:q.xp,custom:false};
  });
  const cust=(customQ||[]).map((q,i)=>({...q,id:100+i,custom:true}));
  return [...base,...cust];
}
function initLB(stored){
  const today=T0;
  if(!stored||!stored.scores){const sc={};AI.forEach(p=>{sc[p.id]=p.base;});return{scores:sc,last:today};}
  const{scores:prev,last}=stored;
  if(last===today)return stored;
  const days=Math.min(Math.max(0,Math.floor((new Date(today)-new Date(last))/86400000)),999);
  const sc={...prev};
  for(let d=1;d<=days;d++){
    const dd=new Date(last);dd.setDate(dd.getDate()+d);
    const ds=dd.toISOString().slice(0,10);
    AI.forEach(p=>{
      const r=sRand(d2s(ds)+p.id.split("").reduce((a,c)=>a+c.charCodeAt(0),0)*17);
      sc[p.id]=(sc[p.id]||p.base)+Math.floor(p.lo+r()*(p.hi-p.lo));
    });
  }
  return{scores:sc,last:today};
}
function getRandRelic(rand,minRarity){
  const r=rand||Math.random;
  const roll=r();
  let pool;
  if(minRarity==="legendary"||roll<0.04)pool=RELICS.filter(x=>x.r==="legendary");
  else if(minRarity==="epic"||roll<0.18)pool=RELICS.filter(x=>x.r==="epic");
  else if(roll<0.50)pool=RELICS.filter(x=>x.r==="rare");
  else pool=RELICS.filter(x=>x.r==="common");
  if(!pool.length)pool=RELICS;
  return pool[Math.floor(r()*pool.length)];
}
function getEquipBonus(equipped){
  const rarityXp={common:.01,rare:.03,epic:.05,legendary:.10};
  return equipped.reduce((s,r)=>s+(rarityXp[r.r]||0),0);
}
function computeWeeklyChallengeProgress(wc,logs,qComp,habitComp,boss){
  if(!wc)return 0;
  let prog=0;
  const ws=new Date(getWeekStart());
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(d.getDate()+i);
    const k=d.toISOString().slice(0,10);
    if(new Date(k)>TODAY)break;
    if(wc.type==="quests")  prog+=Object.values(qComp[k]||{}).filter(v=>v).length;
    else if(wc.type==="minutes") prog+=Object.values(logs[k]||{}).filter(v=>typeof v==="number").reduce((a,b)=>a+b,0);
    else if(wc.type==="active_days"){const hasAct=(logs[k]&&Object.values(logs[k]).some(v=>v>0))||(qComp[k]&&Object.values(qComp[k]).some(v=>v))||(habitComp[k]&&Object.values(habitComp[k]).some(v=>v));if(hasAct)prog++;}
    else if(wc.type==="habits") prog+=Object.values(habitComp[k]||{}).filter(v=>v).length;
    else if(wc.type==="taps") prog+=(boss.tapLog||{})[k]||0;
    else if(wc.type==="oracle") prog+=((boss.oracleLog||{})[k])?1:0;
    else if(wc.type==="relics") prog+=(boss.relicLog||{})[k]||0;
    else if(wc.type==="combo_days"){const qd=Object.values(qComp[k]||{}).filter(v=>v).length;if(qd>=3)prog++;}
  }
  return prog;
}

const SND={
  _ctx:null,enabled:true,_amb:null,
  _init(){if(!this._ctx)try{this._ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(_){}},
  play(type){
    if(!this.enabled)return;
    this._init();const ctx=this._ctx;if(!ctx)return;
    const t=ctx.currentTime;
    const osc=(f,tp,start,dur,vol=0.15)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=tp;o.frequency.value=f;g.gain.setValueAtTime(vol,t+start);g.gain.exponentialRampToValueAtTime(0.001,t+start+dur);o.start(t+start);o.stop(t+start+dur+0.05);};
    if(type==="quest")    {osc(440,"sawtooth",0,0.06,0.2);osc(880,"sine",0.06,0.2,0.1);}
    else if(type==="levelup")   {[261,329,392,523].forEach((f,i)=>osc(f,"sine",i*.1,.5,.12));}
    else if(type==="loot")      {[1046,1318,1568].forEach((f,i)=>osc(f,"sine",i*.08,.4,.1));}
    else if(type==="achievement"){[220,277,330,440].forEach((f,i)=>osc(f,"triangle",i*.1,.6,.1));}
    else if(type==="boss_hit")  {osc(120,"sawtooth",0,.1,.3);osc(60,"sine",.05,.3,.2);}
    else if(type==="boss_defeat"){[110,138,165,220,277,330].forEach((f,i)=>osc(f,"sine",i*.12,.8,.1));}
    else if(type==="buy")       {osc(660,"sine",0,.1,.1);osc(880,"sine",.1,.15,.08);}
    else if(type==="tap")       {osc(300,"square",0,.04,.08);}
    else if(type==="oracle")    {[523,659,784,1047].forEach((f,i)=>osc(f,"sine",i*.15,.7,.08));}
    else if(type==="login")     {[392,523,659].forEach((f,i)=>osc(f,"sine",i*.1,.6,.12));}
  },
  startAmb(){
    if(!this.enabled||this._amb)return;
    this._init();const ctx=this._ctx;if(!ctx)return;
    try{
      const o1=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain();
      o1.type="sine";o1.frequency.value=55;
      o2.type="sine";o2.frequency.value=82.5;
      g.gain.value=0.035;
      o1.connect(g);o2.connect(g);g.connect(ctx.destination);
      o1.start();o2.start();
      this._amb={o1,o2,g};
    }catch(_){}
  },
  stopAmb(){
    if(!this._amb)return;
    try{this._amb.o1.stop();this._amb.o2.stop();}catch(_){}
    this._amb=null;
  }
};

function Donut({data,sz=200}){
  const [hov,setHov]=useState(null);
  const cx=sz/2,cy=sz/2,R=sz*.38,r=sz*.23;
  const tot=data.reduce((s,d)=>s+d.v,0);
  if(!tot)return <div style={{width:sz,height:sz,borderRadius:"50%",border:"2px dashed #1a2438",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:"#2d3d58",fontSize:11,letterSpacing:1,margin:"0 auto",gap:6}}><span style={{fontSize:26,opacity:.3}}>⚔️</span><span style={{fontFamily:"'Share Tech Mono',monospace"}}>NO DATA YET</span></div>;
  let cum=-Math.PI/2;
  const sl=data.map((d,i)=>{
    const ang=(d.v/tot)*2*Math.PI,sa=cum,ea=cum+ang;cum=ea;
    const mid=sa+ang/2,sc=hov===i?1.06:1;
    const tx=(sc-1)*Math.cos(mid)*R*.35,ty=(sc-1)*Math.sin(mid)*R*.35;
    const lg=ang>Math.PI?1:0;
    const path=`M${cx+r*Math.cos(sa)} ${cy+r*Math.sin(sa)}L${cx+R*Math.cos(sa)} ${cy+R*Math.sin(sa)}A${R} ${R} 0 ${lg} 1 ${cx+R*Math.cos(ea)} ${cy+R*Math.sin(ea)}L${cx+r*Math.cos(ea)} ${cy+r*Math.sin(ea)}A${r} ${r} 0 ${lg} 0 ${cx+r*Math.cos(sa)} ${cy+r*Math.sin(sa)}Z`;
    return{path,col:d.col,n:d.n,v:d.v,pct:Math.round((d.v/tot)*100),tx,ty,i};
  });
  const hh=hov!==null?sl[hov]:null;
  return <div style={{display:"flex",justifyContent:"center"}}>
    <svg width={sz} height={sz} style={{overflow:"visible"}}>
      {sl.map(s=><path key={s.i} d={s.path} fill={s.col} opacity={hov===null||hov===s.i?1:0.25}
        style={{transform:`translate(${s.tx}px,${s.ty}px)`,transition:"all .2s",cursor:"pointer"}}
        onTouchStart={e=>{e.preventDefault();setHov(hov===s.i?null:s.i);}}
        onMouseEnter={()=>setHov(s.i)} onMouseLeave={()=>setHov(null)}/>)}
      <circle cx={cx} cy={cy} r={r-2} fill="#04060e"/><circle cx={cx} cy={cy} r={r-1} fill="none" stroke="#1a2438" strokeWidth="1.5"/>
      {hh?<><text x={cx} y={cy-9} textAnchor="middle" fill={hh.col} fontSize={sz*.1} fontWeight="bold" fontFamily="Rajdhani">{hh.pct}%</text>
          <text x={cx} y={cy+10} textAnchor="middle" fill="#6a8098" fontSize={sz*.05} fontFamily="Rajdhani">{hh.n.length>13?hh.n.slice(0,13)+"…":hh.n}</text>
          <text x={cx} y={cy+26} textAnchor="middle" fill="#2d3d58" fontSize={sz*.044} fontFamily="Share Tech Mono">{hh.v}m</text></>
        :<><text x={cx} y={cy-4} textAnchor="middle" fill="#c0cce0" fontSize={sz*.055} fontFamily="Cinzel">TODAY</text>
          <text x={cx} y={cy+14} textAnchor="middle" fill="#2d3d58" fontSize={sz*.046} fontFamily="Share Tech Mono">{tot}min</text></>}
    </svg>
  </div>;
}

function Particles({accent}){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const resize=()=>{canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;};
    resize();
    const pts=Array.from({length:16},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,sz:Math.random()*2+.5,sp:Math.random()*.3+.08,op:Math.random()*.4+.1,col:Math.random()>.6?accent:"#ef4444"}));
    let af;
    const draw=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{ctx.globalAlpha=p.op;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();p.y-=p.sp;if(p.y<-4){p.y=canvas.height+4;p.x=Math.random()*canvas.width;}});af=requestAnimationFrame(draw);};
    draw();return()=>cancelAnimationFrame(af);
  },[accent]);
  return <canvas ref={ref} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",borderRadius:"inherit"}}/>;
}

    .bnav{position:fixed;bottom:0;left:0;right:0;background:#04060ef5;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid #1a2438;display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom,0px);}
    .nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 0 11px;background:none;color:#2d3d58;font-size:7px;letter-spacing:1.2px;transition:all .2s;font-family:'Share Tech Mono',monospace;}
    .nb.on{color:${A};}.nb.on .nbi{filter:drop-shadow(0 0 8px ${A}aa);}
    .nbi{font-size:18px;line-height:1;}
    .sbg{position:fixed;inset:0;background:#000000e0;z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .sht{background:#06090f;border:1px solid #1a2438;border-top:1px solid ${A}1a;border-radius:22px 22px 0 0;padding:20px 16px 60px;width:100%;max-width:430px;display:flex;flex-direction:column;gap:13px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;}
    .shdl{width:38px;height:3px;background:#1a2438;border-radius:4px;margin:0 auto 10px;}
    .flbl{font-size:9px;letter-spacing:2.5px;color:#3d5070;margin-bottom:5px;font-family:'Share Tech Mono',monospace;}
    .btnp{background:linear-gradient(135deg,${A},${A}bb);color:#04060e;padding:13px;border-radius:12px;font-size:13px;letter-spacing:2px;width:100%;transition:all .2s;}
    .btnp:active{opacity:.8;transform:scale(.98);}
    .btns2{background:#0d1525;color:#4d6080;padding:12px;border-radius:12px;font-size:12px;width:100%;letter-spacing:1px;}
    .btnd{background:#ef444415;color:#ef4444;padding:5px 10px;border-radius:8px;font-size:10px;letter-spacing:.5px;flex-shrink:0;}
    .crow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
    .cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s;border:2px solid transparent;flex-shrink:0;}
    .cdot.sel{transform:scale(1.3);border-color:rgba(255,255,255,.8);}
    .gG{text-shadow:0 0 18px ${A}aa;}
    .qbdg{animation:pG 2s ease-in-out infinite;}
    @keyframes floatXP{0%{opacity:1;transform:translateX(-50%) translateY(0)}70%{opacity:1;transform:translateX(-50%) translateY(-70px) scale(1.1)}100%{opacity:0;transform:translateX(-50%) translateY(-100px)}}
    @keyframes pG{0%,100%{box-shadow:0 0 8px ${A}22}50%{box-shadow:0 0 22px ${A}66}}
    @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes popIn{0%{opacity:0;transform:scale(.7)}70%{transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}
    @keyframes lootIn{0%{opacity:0;transform:translateX(-50%) translateY(30px) scale(.8)}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
    @keyframes tapPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.5)}}
    @keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes pu{0%,100%{opacity:.3}50%{opacity:1}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  `;
  return(<>
  <style>{CSS}</style>

  {/* ── OVERLAYS ── */}
  {xpF&&<div key={xpF.k} style={{position:"fixed",top:"36%",left:"50%",zIndex:500,pointerEvents:"none",background:"linear-gradient(135deg,#10b981,#059669)",color:"#fff",padding:"12px 28px",borderRadius:14,fontFamily:"Cinzel,serif",fontSize:20,fontWeight:700,letterSpacing:2,whiteSpace:"nowrap",boxShadow:"0 8px 32px #10b98166",animation:"floatXP 2.4s ease forwards"}}>⚔️ +{xpF.xp} XP{xpF.lbl?` · ${xpF.lbl}`:""}</div>}

  {tapFx&&<div key={tapFx.k} style={{position:"fixed",top:"42%",left:"50%",zIndex:500,pointerEvents:"none",transform:"translateX(-50%)",color:"#ef4444",fontFamily:"'Share Tech Mono',monospace",fontSize:22,fontWeight:700,animation:"tapPop .8s ease forwards"}}>-{tapFx.dmg}HP 🩸</div>}

  {lvlUp&&<div style={{position:"fixed",inset:0,zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000cc",backdropFilter:"blur(8px)"}}>
    <div style={{textAlign:"center",animation:"popIn .6s ease forwards",padding:"40px 30px",background:"linear-gradient(145deg,#100e04,#06090f)",border:`2px solid ${A}`,borderRadius:24,boxShadow:`0 0 60px ${A}55,inset 0 0 40px ${A}0a`,maxWidth:300,width:"90%"}}>
      <div style={{fontSize:60,marginBottom:10,filter:`drop-shadow(0 0 30px ${A})`}}>⚡</div>
      <div style={{fontFamily:"Cinzel,serif",fontSize:12,color:A,letterSpacing:4,marginBottom:6}}>LEVEL UP</div>
      <div style={{fontFamily:"Cinzel,serif",fontSize:48,color:"#f0f4ff",fontWeight:700,lineHeight:1,textShadow:`0 0 30px ${A}88`}}>{lvlUp.lvl}</div>
      <div style={{fontFamily:"Cinzel,serif",fontSize:16,color:A,letterSpacing:3,marginTop:8}}>{lvlUp.title}</div>
      {prestige>0&&<div style={{fontSize:10,color:"#a855f7",marginTop:6,fontFamily:"'Share Tech Mono',monospace"}}>PRESTIGE {prestige} · {["I","II","III","IV","V","VI","VII","VIII","IX","X"][prestige-1]||prestige}</div>}
      <div style={{fontSize:10,color:"#3d5070",letterSpacing:2,marginTop:10,fontFamily:"'Share Tech Mono',monospace"}}>THE REALM TREMBLES</div>
    </div>
  </div>}

  {lootPop&&<div style={{position:"fixed",bottom:115,left:"50%",zIndex:400,pointerEvents:"none",animation:"lootIn .4s ease forwards",background:`linear-gradient(145deg,${lootPop.c}18,#06090f)`,border:`1px solid ${lootPop.c}55`,borderRadius:16,padding:"14px 20px",minWidth:220,maxWidth:300,boxShadow:`0 8px 32px ${lootPop.c}33`,transform:"translateX(-50%)"}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:30,filter:`drop-shadow(0 0 10px ${lootPop.c})`}}>{lootPop.i}</span>
      <div>
        <div style={{fontSize:9,color:lootPop.c,letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:2}}>{lootPop.bonus?"👑 BOSS REWARD":"💎 RELIC FOUND"} · {RR[lootPop.r]?.l}</div>
        <div style={{fontFamily:"Cinzel,serif",fontSize:14,color:"#f0f4ff",letterSpacing:.3}}>{lootPop.n}</div>
        <div style={{fontSize:11,color:"#4d6080",marginTop:2,fontStyle:"italic"}}>{lootPop.d}</div>
      </div>
    </div>
  </div>}

  {achPop&&<div style={{position:"fixed",top:18,left:"50%",zIndex:400,transform:"translateX(-50%)",pointerEvents:"none",animation:"lootIn .4s ease forwards",background:"linear-gradient(145deg,#0e0c04,#06090f)",border:`1px solid ${A}55`,borderRadius:16,padding:"14px 20px",minWidth:240,boxShadow:`0 8px 32px ${A}33`}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:28,filter:`drop-shadow(0 0 10px ${A})`}}>{achPop.i}</span>
      <div><div style={{fontSize:9,color:A,letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:2}}>🏆 ACHIEVEMENT UNLOCKED</div>
        <div style={{fontFamily:"Cinzel,serif",fontSize:13,color:"#f0f4ff"}}>{achPop.n}</div>
        {achPop.xp>0&&<div style={{fontSize:10,color:"#10b981",marginTop:2,fontFamily:"'Share Tech Mono',monospace"}}>+{achPop.xp} XP</div>}
      </div>
    </div>
  </div>}

  {loginPop&&<div style={{position:"fixed",inset:0,zIndex:550,display:"flex",alignItems:"center",justifyContent:"center",background:"#000000cc",backdropFilter:"blur(6px)"}} onClick={()=>setLoginPop(null)}>
    <div style={{animation:"popIn .5s ease forwards",background:"linear-gradient(145deg,#0c0e06,#06090f)",border:`2px solid ${A}44`,borderRadius:22,padding:"36px 28px",textAlign:"center",maxWidth:280,width:"90%",boxShadow:`0 0 50px ${A}33`}}>
      <div style={{fontSize:50,marginBottom:10,filter:`drop-shadow(0 0 20px ${A})`}}>{loginPop.i}</div>
      <div style={{fontFamily:"Cinzel,serif",fontSize:12,color:A,letterSpacing:3,marginBottom:8}}>DAILY BLESSING</div>
      <div style={{fontFamily:"Cinzel,serif",fontSize:15,color:"#f0f4ff",marginBottom:4}}>{loginPop.msg}</div>
      {loginPop.xp>0&&<div style={{fontSize:28,color:"#10b981",fontWeight:700,fontFamily:"'Share Tech Mono',monospace",marginTop:8}}>+{loginPop.xp} XP</div>}
      {loginPop.relic&&<div style={{fontSize:11,color:"#a855f7",marginTop:6,fontFamily:"'Share Tech Mono',monospace"}}>💎 BONUS RELIC AWAITS</div>}
      <div style={{fontSize:10,color:"#3d5070",marginTop:14,fontFamily:"'Share Tech Mono',monospace"}}>TAP ANYWHERE TO CONTINUE</div>
    </div>
  </div>}

  {sv&&<div style={{position:"fixed",top:14,right:14,zIndex:300,background:"#10b98115",border:"1px solid #10b98144",borderRadius:8,padding:"4px 12px",fontSize:9,letterSpacing:2,color:"#10b981",pointerEvents:"none",fontFamily:"'Share Tech Mono',monospace"}}>✓ SAVED</div>}

  <div className="scr">
  {/* ══════════ HOME ══════════ */}
  {tab==="home"&&<>
    {/* Seasonal Banner */}
    <div style={{background:`linear-gradient(135deg,${season.c}12,#06090f)`,border:`1px solid ${season.c}30`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:20}}>{season.i}</span>
      <div style={{flex:1}}><div style={{fontFamily:"Cinzel,serif",fontSize:11,color:season.c,letterSpacing:2}}>{season.n}</div><div style={{fontSize:9,color:"#3d5070",fontFamily:"'Share Tech Mono',monospace",marginTop:1}}>{season.d}</div></div>
      <div style={{fontSize:9,color:"#2d3d58",fontFamily:"'Share Tech Mono',monospace",textAlign:"right"}}>{MO[TODAY.getMonth()]}<br/>{TODAY.getFullYear()}</div>
    </div>

    {/* Character Card */}
    <div className="card" style={{borderColor:`${AT.c}33`,minHeight:160}}>
      <Particles accent={A}/>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${AT.c},transparent)`,borderRadius:"16px 16px 0 0"}}/>
      <div style={{position:"relative",display:"flex",gap:14,alignItems:"center"}}>
        <div onClick={()=>setShAvatar(true)} style={{width:68,height:68,borderRadius:16,flexShrink:0,background:`radial-gradient(circle at 30% 30%,${AT.c}2a,#090e1c)`,border:`2px solid ${AT.c}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,boxShadow:`0 0 24px ${AT.c}2a`,cursor:"pointer",position:"relative"}}>
          {avatar}
          {prestige>0&&<div style={{position:"absolute",bottom:-4,right:-4,background:"#a855f7",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,border:"1px solid #06090f",fontFamily:"'Share Tech Mono',monospace",color:"#fff",fontWeight:700}}>{["Ⅰ","Ⅱ","Ⅲ","Ⅳ","Ⅴ","Ⅵ","Ⅶ","Ⅷ","Ⅸ","Ⅹ"][prestige-1]||prestige}</div>}
        </div>
        <div style={{flex:1,minWidth:0,position:"relative"}}>
          {editN?<input value={cName} onChange={e=>setCName(e.target.value)} onBlur={()=>setEditN(false)} autoFocus style={{fontSize:15,fontFamily:"Cinzel,serif",padding:"4px 8px",marginBottom:3}}/>
          :<div onClick={()=>setEditN(true)} className="gG" style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff",letterSpacing:.5,cursor:"pointer",lineHeight:1.2,marginBottom:2}}>{cName}</div>}
          <div style={{fontSize:10,letterSpacing:2,color:AT.c,marginBottom:8,fontFamily:"'Share Tech Mono',monospace"}}>✦ {getTitle(lvl)} · {AT.n}{prestige>0?` · P${prestige}`:""} ✦</div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#3d5070",marginBottom:4,fontFamily:"'Share Tech Mono',monospace"}}>
            <span>LVL {lvl}</span><span>{xpLvl}/300 XP</span>
          </div>
          <XPBar cur={xpLvl} max={300} col={A} h={7}/>
        </div>
      </div>
      <div style={{position:"relative",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:14}}>
        {[{v:lvl,l:"LEVEL",c:A},{v:streak,l:"STREAK",c:"#f97316"},{v:totXP.toLocaleString(),l:"TOTAL XP",c:"#10b981"},{v:myRank?`#${myRank}`:"—",l:"RANK",c:"#3b82f6"}].map(s=>(
          <div key={s.l} style={{background:"#08101e",border:"1px solid #1a2438",borderRadius:10,padding:"8px 4px",textAlign:"center"}}>
            <div style={{fontSize:s.v.toString().length>4?12:16,fontWeight:700,color:s.c,lineHeight:1,fontFamily:"'Share Tech Mono',monospace"}}>{s.v}</div>
            <div style={{fontSize:7,letterSpacing:2,color:"#3d5070",marginTop:3,fontFamily:"'Share Tech Mono',monospace"}}>{s.l}</div>
          </div>
        ))}
      </div>
    </div>

    {/* Active Buffs */}
    {(bufs.shield||bufs.boost||bufs.charm||equipped.length>0||unlockedSkills.length>0)&&<div style={{background:"#08101e",border:"1px solid #1a2438",borderRadius:12,padding:"10px 14px"}}>
      <div className="slbl" style={{marginBottom:6}}>Active Powers</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {bufs.shield&&<span style={{background:"#06b6d418",border:"1px solid #06b6d433",borderRadius:8,padding:"3px 9px",fontSize:10,color:"#06b6d4",fontFamily:"'Share Tech Mono',monospace"}}>🛡️ SHIELD</span>}
        {bufs.boost&&<span style={{background:"#f59e0b18",border:"1px solid #f59e0b33",borderRadius:8,padding:"3px 9px",fontSize:10,color:"#f59e0b",fontFamily:"'Share Tech Mono',monospace"}}>⚡ 2X XP</span>}
        {bufs.charm&&<span style={{background:"#a855f718",border:"1px solid #a855f733",borderRadius:8,padding:"3px 9px",fontSize:10,color:"#a855f7",fontFamily:"'Share Tech Mono',monospace"}}>🎲 LOOT CHARM</span>}
        {equipped.map(r=><span key={r.id} style={{background:`${r.c}14`,border:`1px solid ${r.c}33`,borderRadius:8,padding:"3px 9px",fontSize:10,color:r.c,fontFamily:"'Share Tech Mono',monospace"}}>{r.i} EQUIPPED</span>)}
        {unlockedSkills.includes("wrath")&&<span style={{background:"#ef444414",border:"1px solid #ef444433",borderRadius:8,padding:"3px 9px",fontSize:10,color:"#ef4444",fontFamily:"'Share Tech Mono',monospace"}}>⚔️ +15%XP</span>}
        {unlockedSkills.includes("tempo")&&<span style={{background:"#3b82f614",border:"1px solid #3b82f633",borderRadius:8,padding:"3px 9px",fontSize:10,color:"#3b82f6",fontFamily:"'Share Tech Mono',monospace"}}>⏱️ x1.25 LOG</span>}
      </div>
    </div>}

    {/* Daily Oracle */}
    <div className="card" style={{borderColor:`${A}22`}}>
      <div className="slbl">Dark Oracle · Daily Fate</div>
      <OracleCard done={!!oracleToday&&!bufs.oracle_extra} prize={oraclePrize} onConsult={consultOracle} accent={A}/>
      {bufs.oracle_extra&&<div style={{marginTop:8,fontSize:9,color:A,textAlign:"center",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace"}}>✦ EXTRA ORACLE ACTIVE — TAP AGAIN ✦</div>}
    </div>

    {/* Quote */}
    <div className="card" style={{borderColor:`${A}18`}}>
      <div style={{fontSize:13,color:"#6a8098",fontStyle:"italic",lineHeight:1.7,marginBottom:6}}>"{quote.q}"</div>
      <div style={{fontSize:9,color:A,letterSpacing:2,fontFamily:"'Share Tech Mono',monospace"}}>— {quote.a}</div>
    </div>

    {/* Weekly Challenge preview */}
    <div className="card" style={{borderColor:`${wcDone?"#10b981":"#f59e0b"}33`,background:wcDone?"linear-gradient(145deg,#071208,#05080f)":"linear-gradient(145deg,#0e0b04,#05080f)"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:30,filter:`drop-shadow(0 0 12px ${wcDone?"#10b981":"#f59e0b"})`}}>{wc.i}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:9,color:"#3d5070",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",marginBottom:2}}>WEEKLY CHALLENGE</div>
          <div style={{fontFamily:"Cinzel,serif",fontSize:14,color:wcDone?"#10b981":"#f0f4ff"}}>{wc.n}</div>
          <div style={{fontSize:10,color:"#4d6080",marginTop:2}}>{wc.d}</div>
          <div style={{marginTop:6}}><XPBar cur={wcProg} max={wc.req} col={wcDone?"#10b981":"#f59e0b"} h={5}/></div>
          <div style={{fontSize:9,color:wcDone?"#10b981":"#3d5070",marginTop:4,fontFamily:"'Share Tech Mono',monospace"}}>{Math.min(wcProg,wc.req)}/{wc.req} · +{wc.xp} XP reward</div>
        </div>
        {wcDone&&!wcAlreadyClaimed&&<button onClick={claimWC} style={{background:"#10b98122",border:"1px solid #10b98144",borderRadius:10,padding:"8px 12px",color:"#10b981",fontSize:10,letterSpacing:1,flexShrink:0,fontFamily:"'Share Tech Mono',monospace",animation:"pG 2s ease-in-out infinite"}}>CLAIM</button>}
        {wcAlreadyClaimed&&<span style={{color:"#10b981",fontSize:14,flexShrink:0}}>✓</span>}
      </div>
    </div>

    {/* Donut + today stats */}
    <div className="card">
      <div className="slbl">Today's Activity — {T0}</div>
      <Donut data={pieData} sz={200}/>
    </div>

    {/* Quest preview */}
    <div className="card" style={{borderColor:`${AT.c}22`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div className="slbl" style={{marginBottom:0}}>Daily Trials</div>
        <span style={{fontSize:10,color:AT.c,fontFamily:"'Share Tech Mono',monospace"}}>{dDone}/{dQuests.length} · +{dXP}XP</span>
      </div>
      {dQuests.slice(0,3).map(q=>{const done=!!dComp[q.id];return(<div key={q.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,opacity:done?.4:1}}>
        <div style={{width:15,height:15,borderRadius:4,border:`2px solid ${done?"#10b981":"#1a2438"}`,background:done?"#10b98133":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#10b981"}}>{done?"✓":""}</div>
        <span style={{flex:1,fontSize:12,fontWeight:600,color:done?"#2d4040":"#c8d4e8",textDecoration:done?"line-through":"none"}}>{q.title}{q.custom?" ✍️":""}</span>
        <span style={{fontSize:10,color:done?"#10b981":A,fontFamily:"'Share Tech Mono',monospace"}}>+{q.xp}</span>
      </div>);})}
      <button onClick={()=>setTab("trials")} style={{width:"100%",background:`${AT.c}12`,border:`1px solid ${AT.c}33`,borderRadius:10,padding:"9px",color:AT.c,fontSize:10,letterSpacing:2,marginTop:4,fontFamily:"'Share Tech Mono',monospace"}}>VIEW ALL TRIALS →</button>
    </div>

    {/* Streak + rival */}
    {streak>0&&<div className="card" style={{display:"flex",alignItems:"center",gap:14,background:"linear-gradient(135deg,#0e0a04,#05080f)",borderColor:"#f9731633"}}>
      <span style={{fontSize:40,filter:"drop-shadow(0 0 12px #f97316)",flexShrink:0}}>🔥</span>
      <div>
        <div style={{fontSize:22,fontWeight:700,color:"#f97316",fontFamily:"'Share Tech Mono',monospace"}}>{streak} DAY STREAK</div>
        <div style={{fontSize:9,color:"#5c3010",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace"}}>{streak>=30?"LEGENDARY DEVOTION":streak>=14?"CURSED DEDICATION":streak>=7?"THE UNDYING FLAME":"THE FLAME MUST NOT DIE"}</div>
      </div>
    </div>}
    {rivalData&&<div className="card" style={{borderColor:"#a855f733"}}>
      <div className="slbl">Nemesis Tracker</div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{fontSize:28}}>{rivalData.av}</span>
        <div style={{flex:1}}><div style={{fontFamily:"Cinzel,serif",fontSize:13,color:"#c8d4e8"}}>{rivalData.n}</div>
          <div style={{fontSize:10,color:"#3d5070",fontFamily:"'Share Tech Mono',monospace"}}>{rivalData.score.toLocaleString()} XP</div>
          <div style={{marginTop:5}}><XPBar cur={totXP} max={rivalData.score+100} col={totXP>=rivalData.score?"#10b981":"#a855f7"} h={5}/></div>
        </div>
        {totXP>=rivalData.score?<div style={{color:"#10b981",fontSize:12,fontWeight:700}}>⚔️ BEATEN</div>
          :<div style={{color:"#a855f7",fontSize:12,fontFamily:"'Share Tech Mono',monospace"}}>-{(rivalData.score-totXP).toLocaleString()}</div>}
      </div>
    </div>}
  </>}
  {/* ══════════ TRIALS ══════════ */}
  {tab==="trials"&&<>
    <div className="card" style={{borderColor:`${AT.c}44`,background:`linear-gradient(145deg,${AT.c}0a,#05080f)`}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${AT.c},transparent)`,borderRadius:"16px 16px 0 0"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><div style={{fontFamily:"Cinzel,serif",fontSize:16,color:"#f0f4ff"}}>Daily Trials</div>
          <div style={{fontSize:9,color:"#3d5070",letterSpacing:2,marginTop:2,fontFamily:"'Share Tech Mono',monospace"}}>{MO[TODAY.getMonth()]} {TODAY.getDate()} · {AT.i} {AT.n}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:26,fontWeight:700,color:A,fontFamily:"'Share Tech Mono',monospace"}}>+{dXP}</div><div style={{fontSize:8,color:"#3d5070",letterSpacing:2,fontFamily:"'Share Tech Mono',monospace"}}>XP TODAY</div></div>
      </div>
      <div style={{marginTop:12}}><XPBar cur={dDone} max={Math.max(1,dQuests.length)} col={AT.c} h={7}/>

        <label style={{background:"#0d1525",border:"1px solid #1a2438",borderRadius:12,padding:"12px",color:"#4d6080",fontSize:11,letterSpacing:2,fontFamily:"'Share Tech Mono',monospace",textAlign:"center",cursor:"pointer"}}>
          📥 IMPORT SAVE DATA
          <input type="file" accept=".json" style={{display:"none"}} onChange={e=>e.target.files[0]&&importData(e.target.files[0])}/>
        </label>
      </div>
    </div>

    {/* How it works */}
    <div className="card">
      <div className="slbl">How the Realm Works</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {[
          {i:"⚔️",t:"Daily Trials",d:"4–5 quests per day based on archetype. Complete for XP and boss damage."},
          {i:"🔮",t:"Daily Oracle",d:"Flip the card each day for a random prize: XP, relics, shields, boosts."},
          {i:"📋",t:"Weekly Challenge",d:"A rotating challenge each week. Complete it and claim a big XP reward."},
          {i:"🐉",t:"Boss Battles",d:"Weekly boss. Complete quests OR tap it directly (20 taps/day). Defeat = 500XP + legendary."},
          {i:"🌳",t:"Skill Tree",d:"Earn 1 skill point per level. Unlock passives: XP% boosts, better loot, stronger boss damage."},
          {i:"💍",t:"Relic Equip",d:"Equip up to 2 relics for passive XP bonuses. Epic=+5%, Legendary=+10%."},
          {i:"♾️",t:"Prestige",d:"Hit Level 100? Prestige to reset XP/level and get a prestige badge. Keep everything else."},
          {i:"📊",t:"Log + Calendar",d:"Log minutes to objectives. Full month calendar + 35-day heatmap + 7-day XP chart."},
          {i:"🏆",t:"Achievements",d:"43 achievements across 13 categories. Unlock for XP rewards and proof of grind."},
          {i:"💰",t:"Dark Market",d:"7 market items including Streak Shield, XP Boost, Phoenix Ash (restore broken streak)."},
          {i:"📖",t:"War Journal",d:"Write daily entries. Chronicle your deeds, goals, and dark thoughts."},
          {i:"🎨",t:"Themes",d:"7 color themes — unlock up to Astral Plane at Level 80."},
        ].map(x=>(
          <div key={x.t} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <span style={{fontSize:18,flexShrink:0,marginTop:1}}>{x.i}</span>
            <div><div style={{fontSize:13,fontWeight:700,color:"#c0cce0",marginBottom:2}}>{x.t}</div><div style={{fontSize:11,color:"#3d5070",lineHeight:1.6}}>{x.d}</div></div>
          </div>
        ))}
      </div>
    </div>

    {/* Edit Profile */}
    <div className="card">
      <div className="slbl">Your Identity</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div>
          <div className="flbl">YOUR NAME</div>
          <input value={cName} onChange={e=>setCName(e.target.value)} placeholder="Your warrior name…" style={{fontSize:15,fontFamily:"Cinzel,serif"}}/>
        </div>
        <div>
          <div className="flbl">YOUR MISSION / GOAL</div>
          <input value={cClass} onChange={e=>setCClass(e.target.value)} placeholder="What are you conquering…"/>
          <div style={{fontSize:9,color:"#2d3d58",marginTop:5,fontFamily:"'Share Tech Mono',monospace"}}>SHOWN ON YOUR CHARACTER CARD AND LEADERBOARD</div>
        </div>
      </div>
    </div>

    {/* Danger Zone */}
    <div className="card" style={{borderColor:"#ef444422"}}>
      <div className="slbl" style={{color:"#ef444466"}}>Danger Zone</div>
      <button onClick={()=>{if(window.confirm("RESET ALL DATA? Permanent — cannot be undone.")){localStorage.removeItem("dqb6");localStorage.removeItem("dqb6-lb");window.location.reload();}}}
        style={{background:"#ef444415",border:"1px solid #ef444433",borderRadius:12,padding:"12px",color:"#ef4444",fontSize:11,letterSpacing:2,width:"100%",fontFamily:"'Share Tech Mono',monospace"}}>
        💀 RESET ALL DATA
      </button>
    </div>
  </>}

  </div>{/* end .scr */}

  {/* ══════════ BOTTOM NAV ══════════ */}
  <nav className="bnav">
    {[{id:"home",i:"⚔️",l:"HOME"},{id:"trials",i:"📋",l:"TRIALS"},{id:"forge",i:"🐉",l:"FORGE"},{id:"log",i:"✏️",l:"LOG"},{id:"ranks",i:"👑",l:"RANKS"},{id:"tome",i:"📜",l:"TOME"}].map(n=>(
      <button key={n.id} className={`nb ${tab===n.id?"on":""}`} onClick={()=>setTab(n.id)}>
        <span className="nbi">{n.i}</span><span>{n.l}</span>
      </button>
    ))}
  </nav>

  {/* ══════════ BOTTOM SHEETS ══════════ */}
  {shObj&&<div className="sbg" onClick={e=>e.target===e.currentTarget&&setShObj(false)}>
    <div className="sht"><div className="shdl"/>
      <div style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff"}}>Forge New Objective</div>
      <div><div className="flbl">NAME</div><input placeholder="e.g. Post YouTube Shorts" value={nObj.n} onChange={e=>setNObj(p=>({...p,n:e.target.value}))}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><div className="flbl">ICON</div><input placeholder="🎯" value={nObj.i} onChange={e=>setNObj(p=>({...p,i:e.target.value}))}/></div>
        <div><div className="flbl">TARGET hrs/month</div><input type="number" placeholder="20" value={nObj.tgt} onChange={e=>setNObj(p=>({...p,tgt:e.target.value}))}/></div>
      </div>
      <div><div className="flbl">RARITY</div><select value={nObj.r} onChange={e=>setNObj(p=>({...p,r:e.target.value}))}>{Object.keys(RR).map(r=><option key={r} value={r}>{RR[r].l}</option>)}</select></div>
      <div><div className="flbl">COLOR</div><div className="crow">{COLS.map(c=><div key={c} className={`cdot ${nObj.c===c?"sel":""}`} style={{background:c}} onClick={()=>setNObj(p=>({...p,c}))}/>)}</div></div>
      <button className="btnp" onClick={addObj}>⚔️ FORGE OBJECTIVE</button>
      <button className="btns2" onClick={()=>setShObj(false)}>CANCEL</button>
    </div>
  </div>}

  {shGoal&&<div className="sbg" onClick={e=>e.target===e.currentTarget&&setShGoal(false)}>
    <div className="sht"><div className="shdl"/>
      <div style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff"}}>Forge Eternal Vow</div>
      <div><div className="flbl">TITLE</div><input placeholder="Vow of the Creator" value={nGoal.ti} onChange={e=>setNGoal(p=>({...p,ti:e.target.value}))}/></div>
      <div><div className="flbl">DESCRIPTION</div><input placeholder="Describe your conquest…" value={nGoal.de} onChange={e=>setNGoal(p=>({...p,de:e.target.value}))}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><div className="flbl">ICON</div><input placeholder="🏆" value={nGoal.i} onChange={e=>setNGoal(p=>({...p,i:e.target.value}))}/></div>
        <div><div className="flbl">UNIT (videos, hrs…)</div><input placeholder="videos" value={nGoal.u} onChange={e=>setNGoal(p=>({...p,u:e.target.value}))}/></div>
      </div>
      <div><div className="flbl">TARGET NUMBER</div><input type="number" placeholder="100" value={nGoal.tot} onChange={e=>setNGoal(p=>({...p,tot:e.target.value}))}/></div>
      <div><div className="flbl">COLOR</div><div className="crow">{COLS.map(c=><div key={c} className={`cdot ${nGoal.c===c?"sel":""}`} style={{background:c}} onClick={()=>setNGoal(p=>({...p,c}))}/>)}</div></div>
      <button className="btnp" onClick={addGoal}>🎯 SEAL THE VOW</button>
      <button className="btns2" onClick={()=>setShGoal(false)}>CANCEL</button>
    </div>
  </div>}

  {shHabit&&<div className="sbg" onClick={e=>e.target===e.currentTarget&&setShHabit(false)}>
    <div className="sht"><div className="shdl"/>
      <div style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff"}}>Forge Daily Habit</div>
      <div><div className="flbl">HABIT NAME</div><input placeholder="Cold Shower" value={nHabit.n} onChange={e=>setNHabit(p=>({...p,n:e.target.value}))}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div><div className="flbl">ICON</div><input placeholder="🚿" value={nHabit.i} onChange={e=>setNHabit(p=>({...p,i:e.target.value}))}/></div>
        <div style={{display:"flex",flexDirection:"column",justifyContent:"flex-end"}}><div className="flbl">COLOR</div><div className="crow">{COLS.slice(0,6).map(c=><div key={c} className={`cdot ${nHabit.c===c?"sel":""}`} style={{background:c}} onClick={()=>setNHabit(p=>({...p,c}))}/>)}</div></div>
      </div>
      <button className="btnp" onClick={addHabit}>✦ FORGE HABIT</button>
      <button className="btns2" onClick={()=>setShHabit(false)}>CANCEL</button>
    </div>
  </div>}

  {shCustomQ&&<div className="sbg" onClick={e=>e.target===e.currentTarget&&setShCustomQ(false)}>
    <div className="sht"><div className="shdl"/>
      <div style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff"}}>Forge Custom Quest</div>
      <div style={{fontSize:10,color:"#3d5070",fontStyle:"italic"}}>Create a personal trial that will appear in your daily quest list.</div>
      <div><div className="flbl">QUEST TITLE</div><input placeholder="Complete my video script" value={nCQ.title} onChange={e=>setNCQ(p=>({...p,title:e.target.value}))}/></div>
      <div><div className="flbl">DESCRIPTION (optional)</div><input placeholder="Describe the dark challenge…" value={nCQ.desc} onChange={e=>setNCQ(p=>({...p,desc:e.target.value}))}/></div>
      <div><div className="flbl">XP REWARD (10–200)</div><input type="number" placeholder="50" value={nCQ.xp} onChange={e=>setNCQ(p=>({...p,xp:e.target.value}))}/></div>
      <button className="btnp" onClick={addCustomQ}>✍️ FORGE QUEST</button>
      <button className="btns2" onClick={()=>setShCustomQ(false)}>CANCEL</button>
    </div>
  </div>}

  {shAvatar&&<div className="sbg" onClick={e=>e.target===e.currentTarget&&setShAvatar(false)}>
    <div className="sht"><div className="shdl"/>
      <div style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff"}}>Choose Your Avatar</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10}}>
        {AVATARS.map(a=><button key={a} onClick={()=>{setAvatar(a);setShAvatar(false);}} style={{background:avatar===a?`${A}22`:"#08101e",border:`1px solid ${avatar===a?A+"55":"#1a2438"}`,borderRadius:12,padding:"14px 0",fontSize:24}}>{a}</button>)}
      </div>
      <button className="btns2" onClick={()=>setShAvatar(false)}>CANCEL</button>
    </div>
  </div>}

  {shJournal&&<div className="sbg" onClick={e=>e.target===e.currentTarget&&setShJournal(false)}>
    <div className="sht"><div className="shdl"/>
      <div style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff"}}>War Journal — {T0}</div>
      <div style={{fontSize:11,color:"#3d5070",fontStyle:"italic"}}>Chronicle your deeds, your failures, your dark resolve...</div>
      <textarea value={jDraft} onChange={e=>setJDraft(e.target.value)} placeholder="Today I…" rows={6} style={{resize:"none",lineHeight:1.7,fontSize:14}}/>
      <button className="btnp" onClick={saveJournal}>📖 SEAL THE CHRONICLE</button>
      <button className="btns2" onClick={()=>setShJournal(false)}>CANCEL</button>
    </div>
  </div>}

  {shEquip&&<div className="sbg" onClick={e=>e.target===e.currentTarget&&setShEquip(false)}>
    <div className="sht"><div className="shdl"/>
      <div style={{fontFamily:"Cinzel,serif",fontSize:17,color:"#f0f4ff"}}>Equip Relics</div>
      <div style={{fontSize:10,color:"#3d5070",fontStyle:"italic"}}>Equipped relics give passive XP bonuses to all XP earned. Slots: {equipped.length}/{maxEquip}</div>
      {[...new Map(inv.map(r=>[r.n,r])).values()].map(r=>{
        const isEquipped=equipped.some(e=>e.id===r.id);
        const full=!isEquipped&&equipped.length>=maxEquip;
        return(<div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #0d1525",opacity:full?.4:1}}>
          <span style={{fontSize:22,filter:`drop-shadow(0 0 6px ${r.c})`}}>{r.i}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:isEquipped?r.c:"#c8d4e8"}}>{r.n}</div>
            <div style={{fontSize:9,color:"#2d3d58",fontFamily:"'Share Tech Mono',monospace",marginTop:1}}>{RR[r.r]?.l} · +{(getEquipBonus([r])*100).toFixed(0)}% XP</div>
          </div>
          <button onClick={()=>!full&&toggleEquip(r)} style={{background:isEquipped?`${r.c}22`:"#0d1525",border:`1px solid ${isEquipped?r.c+"55":"#1a2438"}`,borderRadius:8,padding:"6px 12px",color:isEquipped?r.c:"#4d6080",fontSize:10,letterSpacing:1,fontFamily:"'Share Tech Mono',monospace",flexShrink:0}}>
            {isEquipped?"UNEQUIP":"EQUIP"}
          </button>
        </div>);
      })}
      <button className="btns2" onClick={()=>setShEquip(false)}>DONE</button>
    </div>
  </div>}

  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
